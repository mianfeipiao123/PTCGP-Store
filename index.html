<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1D2C5F">
<title data-i18n="site_title">Pokémon Trading Card Game Pocket official web store</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  /* ---------------- official palette (from live site JS) ---------------- */
  :root {
    --brand:        #1D2C5F;   /* Pokémon classic deep navy */
    --brand-2:      #0070B9;   /* signature mid blue */
    --brand-3:      #3C5AA6;   /* royal blue */
    --brand-4:      #2A75BB;   /* link blue */
    --gold:         #FFCB05;   /* Pokémon gold */
    --gold-2:       #C8A008;   /* darker gold accent */
    --red:          #ED1C24;   /* Pokémon red */

    --cyan:         #00ebff;
    --cyan-2:       #34c1ff;
    --mint:         #00e2b6;
    --teal:         #00bfe2;
    --pink:         #e88dff;

    --ink:          #3A4452;   /* primary text */
    --ink-2:        #4C5C74;
    --muted:        #707e93;
    --muted-2:      #99adc7;

    --bg:           #F0F7FA;
    --bg-2:         #E7EFF6;
    --bg-3:         #F1F7FA;
    --panel:        #ffffff;
    --line:         #d8e3f0;

    --cheap:        #00bfa3;
    --expensive:    #ff5b8a;

    --shadow-sm:    0 1px 2px rgba(29, 44, 95, .06), 0 1px 1px rgba(29, 44, 95, .04);
    --shadow-md:    0 4px 16px rgba(29, 44, 95, .08), 0 2px 4px rgba(29, 44, 95, .05);

    --radius-md:    12px;
    --radius-lg:    18px;
    --radius-xl:    24px;

    --grad-brand:   linear-gradient(90deg, #00ebff, #3c87ff 100%);
    --grad-soft:    linear-gradient(90deg, #F1F7FA .08%, #E7EFF6 99.92%);
    --grad-rainbow: linear-gradient(90deg, #8da2ff, #31e5ef 33.3%, #00e2b6 66.7%, #00bfe2);

    --font-sans:    "Noto Sans TC", "Noto Sans", -apple-system, BlinkMacSystemFont,
                    "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, Helvetica, sans-serif;
    --font-mono:    ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; }
  body {
    background: var(--bg);
    background-image:
      radial-gradient(circle at 0% 0%, rgba(60,135,255,.12), transparent 40%),
      radial-gradient(circle at 100% 0%, rgba(0,235,255,.10), transparent 35%),
      var(--bg);
    color: var(--ink);
    font-family: var(--font-sans);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  /* ---------------- top brand bar ---------------- */
  header {
    background:
      linear-gradient(180deg, #ffffff 0%, #F1F7FA 60%, #E7EFF6 100%);
    color: var(--brand);
    padding: 22px 24px 18px;
    position: relative;
    overflow: hidden;
    padding-top: max(22px, env(safe-area-inset-top));
    border-bottom: 1px solid var(--line);
  }
  /* Pokémon-style gold + red accent stripe at the bottom edge */
  header::before {
    content: "";
    position: absolute; left: 0; right: 0; bottom: 3px;
    height: 2px;
    background: var(--red);
    opacity: .85;
  }
  header::after {
    content: "";
    position: absolute; left: 0; right: 0; bottom: 0;
    height: 3px;
    background: var(--gold);
  }
  header h1 {
    margin: 0;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: .3px;
    color: var(--brand);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  /* Round Pokéball-like badge: top half red, bottom half white, black ring, gold rim */
  header h1::before {
    content: "";
    width: 26px; height: 26px;
    border-radius: 50%;
    background:
      radial-gradient(circle, #ffffff 0 6px, #1D2C5F 6px 7px, transparent 7px),
      linear-gradient(180deg, var(--red) 0 50%, #ffffff 50% 100%);
    border: 1.5px solid var(--brand);
    box-shadow: 0 0 0 1.5px var(--gold), 0 2px 4px rgba(29,44,95,.18);
    flex: 0 0 auto;
  }
  header h1 small {
    font-size: 14px;
    font-weight: 500;
    color: var(--ink-2);
    opacity: .95;
  }

  /* ---------------- sticky controls ---------------- */
  .controls {
    background: rgba(255, 255, 255, .92);
    backdrop-filter: saturate(180%) blur(10px);
    -webkit-backdrop-filter: saturate(180%) blur(10px);
    border-bottom: 1px solid var(--line);
    position: sticky;
    top: 0;
    z-index: 10;
    padding: 12px 24px;
  }
  .controls-inner {
    display: flex;
    flex-wrap: wrap;
    gap: 12px 16px;
    align-items: center;
  }
  .ctrl {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 0;
    flex: 1 1 140px;
  }
  .ctrl label {
    font-size: 12px;
    color: var(--muted);
    font-weight: 500;
  }
  .ctrl select,
  .ctrl input {
    appearance: none;
    -webkit-appearance: none;
    background: #fff;
    color: var(--ink);
    border: 1.5px solid var(--line);
    border-radius: 10px;
    padding: 9px 12px;
    font-size: 14px;
    font-family: inherit;
    font-weight: 500;
    width: 100%;
    transition: border-color .15s, box-shadow .15s;
  }
  .ctrl select:focus,
  .ctrl input:focus {
    outline: none;
    border-color: var(--brand-2);
    box-shadow: 0 0 0 3px rgba(60, 135, 255, .15);
  }
  .ctrl select {
    background-image:
      linear-gradient(45deg, transparent 50%, var(--muted) 50%),
      linear-gradient(135deg, var(--muted) 50%, transparent 50%);
    background-position:
      calc(100% - 18px) 50%,
      calc(100% - 13px) 50%;
    background-size: 5px 5px, 5px 5px;
    background-repeat: no-repeat;
    padding-right: 32px;
    cursor: pointer;
  }
  .fx-status {
    font-size: 12px;
    color: var(--muted);
    flex: 0 0 100%;
    margin-top: 4px;
  }

  /* ---------------- grid ---------------- */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 16px;
    padding: 20px 24px 40px;
  }

  /* ---------------- card ---------------- */
  .card {
    background: var(--panel);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-md);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: transform .2s ease, box-shadow .2s ease;
  }
  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(0, 55, 131, .12);
  }
  .card-head {
    width: 100%;
    background: var(--grad-soft);
    padding: 14px 16px;
    display: flex;
    gap: 12px;
    align-items: center;
    border-bottom: 1px solid var(--line);
    border-left: 0;
    border-right: 0;
    border-top: 0;
    color: inherit;
    font: inherit;
    text-align: left;
    cursor: pointer;
  }
  .card.is-collapsed .card-head { border-bottom: 0; }
  .card-head img {
    width: 64px;
    height: 64px;
    object-fit: contain;
    border-radius: 10px;
    background: #fff;
    box-shadow: var(--shadow-sm);
    padding: 4px;
    flex: 0 0 auto;
  }
  .card-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--ink);
    line-height: 1.3;
    word-break: break-word;
  }
  .card-toggle-icon {
    width: 22px;
    height: 22px;
    border: 1px solid var(--line);
    border-radius: 50%;
    background: #fff;
    box-shadow: var(--shadow-sm);
    flex: 0 0 auto;
    position: relative;
  }
  .card-toggle-icon::before {
    content: "";
    position: absolute;
    left: 7px;
    top: 6px;
    width: 6px;
    height: 6px;
    border-right: 2px solid var(--brand-2);
    border-bottom: 2px solid var(--brand-2);
    transform: rotate(45deg);
    transition: transform .16s ease, top .16s ease;
  }
  .card.is-collapsed .card-toggle-icon::before {
    top: 7px;
    transform: rotate(-45deg);
  }
  .card-body { display: block; }
  .card.is-collapsed .card-body { display: none; }
  .card-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    line-height: 1.4;
    word-break: break-all;
  }
  .card-meta code {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--ink-2);
    background: rgba(0, 55, 131, .05);
    padding: 1px 5px;
    border-radius: 4px;
  }

  .price-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    font-variant-numeric: tabular-nums;       /* equal-width digits everywhere */
    -moz-font-feature-settings: "tnum";
    -webkit-font-feature-settings: "tnum";
    font-feature-settings: "tnum";
  }
  .price-table th,
  .price-table td {
    padding: 7px 10px;
    text-align: right;
    border-bottom: 1px solid var(--bg-2);
    vertical-align: middle;
  }
  .price-table tr:last-child td { border-bottom: 0; }
  .price-table thead th {
    background: #fafcff;
    text-align: left;
    color: var(--muted);
    font-weight: 600;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: .5px;
    padding: 8px 10px;
    position: sticky;
    top: 0;
  }
  .price-table thead th + th { text-align: right; }
  .price-table td.cur {
    text-align: left;
    font-family: var(--font-mono);
    font-weight: 700;
    color: var(--brand);
    font-size: 12px;
    letter-spacing: .4px;
    width: 52px;                              /* fixed slot — all 3-letter codes line up */
    white-space: nowrap;
  }

  /* The amount + normalized columns share a 4-slot layout:
       [ symbol | int (right-aligned) | decimal point | fraction (left-aligned) ]
     so the decimal points line up vertically across all rows, the way a
     spreadsheet would render them. Currencies without fractional digits
     (JPY/KRW/IDR/CLP/HUF…) keep an empty slot so the column still aligns. */
  .price-table td.amt,
  .price-table td.norm {
    font-family: var(--font-mono);
    color: var(--ink);
    padding-left: 4px;
    padding-right: 10px;
    white-space: nowrap;
  }
  .price-table td.amt > .sym,
  .price-table td.norm > .sym {
    display: inline-block;
    min-width: 30px;
    margin-right: 4px;
    text-align: right;
    color: var(--muted);
    font-size: 11px;
    font-weight: 500;
    vertical-align: baseline;
  }
  .price-table td.amt > .num,
  .price-table td.norm > .num {
    display: inline-flex;
    align-items: baseline;
  }
  .price-table .num > .int {
    min-width: 44px;
    text-align: right;
    font-weight: 600;
    color: var(--ink);
  }
  .price-table .num > .dec {
    display: inline-block;
    width: 5px;
    text-align: center;
    color: var(--muted-2);
  }
  .price-table .num > .frac {
    display: inline-block;
    min-width: 18px;
    text-align: left;
    font-weight: 500;
    color: var(--ink-2);
    font-size: 12px;
  }
  .price-table td.norm > .num > .int { font-weight: 500; color: var(--ink-2); }
  .price-table tr.cheapest { background: rgba(0, 191, 163, .06); }
  .price-table tr.cheapest td.norm > .num > .int,
  .price-table tr.cheapest td.norm > .num > .frac { color: var(--cheap); font-weight: 700; }
  .price-table tr.cheapest td.amt  > .num > .int { color: var(--cheap); }
  .price-table tr.cheapest td.cur::before {
    content: "★ ";
    color: var(--cheap);
  }
  .price-table tr.expensive td.norm > .num > .int,
  .price-table tr.expensive td.norm > .num > .frac { color: var(--expensive); font-weight: 700; }
  .bar-cell {
    padding: 4px 10px 4px 0 !important;
    width: 80px;
  }
  .bar-track {
    height: 6px;
    background: var(--bg-2);
    border-radius: 3px;
    overflow: hidden;
  }
  .bar {
    height: 100%;
    background: var(--grad-brand);
    border-radius: 3px;
  }
  tr.cheapest .bar { background: linear-gradient(90deg, var(--mint), var(--teal)); }
  tr.expensive .bar { background: linear-gradient(90deg, var(--pink), #ff5b8a); }

  /* ---------------- empty / footer ---------------- */
  .empty {
    color: var(--muted);
    font-style: italic;
    padding: 60px 20px;
    text-align: center;
  }
  .empty code {
    font-family: var(--font-mono);
    background: rgba(0,55,131,.06);
    padding: 2px 6px;
    border-radius: 4px;
    color: var(--ink);
  }
  footer {
    padding: 20px 24px max(20px, env(safe-area-inset-bottom));
    color: var(--muted);
    font-size: 12px;
    text-align: center;
    border-top: 1px solid var(--line);
    background: rgba(255,255,255,.5);
  }
  footer a { color: var(--brand-2); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  /* ---------------- mobile ---------------- */
  @media (max-width: 720px) {
    header { padding: 16px 16px 14px; padding-top: max(16px, env(safe-area-inset-top)); }
    header h1 { font-size: 18px; gap: 10px; }
    header h1::before { width: 22px; height: 22px; }
    header h1 small { font-size: 12.5px; }

    .controls { padding: 10px 12px; }
    .controls-inner { gap: 8px 10px; }
    .ctrl { flex: 1 1 calc(50% - 5px); min-width: 0; }
    .ctrl:has(input) { flex: 1 1 100%; }
    .ctrl select, .ctrl input { padding: 8px 10px; font-size: 14px; }
    .ctrl select { padding-right: 28px; }

    .grid {
      grid-template-columns: 1fr;
      gap: 12px;
      padding: 12px 12px 32px;
    }
    .card-head { padding: 12px; gap: 10px; }
    .card-head img { width: 56px; height: 56px; }
    .card-title { font-size: 13.5px; }

    .price-table { font-size: 12.5px; }
    .price-table th, .price-table td { padding: 7px 8px; }
    .bar-cell { width: 56px; }

    footer { padding: 16px 12px max(16px, env(safe-area-inset-bottom)); font-size: 11.5px; }
  }
  @media (max-width: 380px) {
    .ctrl { flex: 1 1 100%; }
    .bar-cell { display: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    .card { transition: none; }
  }
</style>
</head>
<body>

<header>
  <h1><span data-i18n="header">Official Web Store</span> <small data-i18n="page_title">Regional Price Comparison</small></h1>
</header>

<div class="controls">
  <div class="controls-inner">
    <div class="ctrl">
      <label for="uiLanguage" data-i18n="language">Language</label>
      <select id="uiLanguage"></select>
    </div>
    <div class="ctrl">
      <label for="baseCurrency" data-i18n="base_currency">Base currency</label>
      <select id="baseCurrency"></select>
    </div>
    <div class="ctrl">
      <label for="sortBy" data-i18n="sort_label">Sort</label>
      <select id="sortBy">
        <option value="cheap" data-i18n="sort_cheap">Normalized: cheap → expensive</option>
        <option value="expensive" data-i18n="sort_expensive">Normalized: expensive → cheap</option>
        <option value="currency" data-i18n="sort_currency">Currency A → Z</option>
      </select>
    </div>
    <div class="ctrl">
      <label for="search" data-i18n="search">Search product</label>
      <input id="search" type="text" data-i18n-ph="search_ph" placeholder="e.g. Poké Gold 100" autocomplete="off">
    </div>
    <div class="fx-status" id="fxStatus" data-i18n="fx_loading">Loading rates…</div>
  </div>
</div>

<div id="container"><div class="empty" data-i18n="loading">Loading data…</div></div>

<footer>
  <span data-i18n="snap_at">Snapshot</span>: <span id="snapAt">—</span> ·
  <span data-i18n="fx_label">Rates</span>:
  <a href="https://open.er-api.com/" target="_blank" rel="noopener">open.er-api.com</a>
</footer>

<script>
const FX_CACHE_KEY = 'ptcgp_fx_cache_v1';
const FX_TTL_MS = 6 * 60 * 60 * 1000;
const PRIMARY_FX = 'https://open.er-api.com/v6/latest/USD';
const FALLBACK_FX = 'https://api.exchangerate.host/latest?base=USD';

const LOCALES_ORDER = ['ja-JP','en-US','fr-FR','it-IT','de-DE','es-ES','pt-BR','ko-KR','zh-TW'];
const LANG_STORAGE_KEY = 'ptcgp_ui_lang';

let DATA = null;
let RATES = null;
let RATES_TIME = null;
let I18N = null;           // full i18n dictionary
let PRODUCT_I18N = null;   // sku -> locale -> { name, group_name }
let LANG = 'zh-TW';        // current locale (default 繁體中文)
let LANG_NAMES = {};       // { 'ja-JP': '日本語', ... }
const CARD_EXPANDED = new Map(); // sku -> user-chosen expanded/collapsed state

const DEFAULT_BASE_CURRENCY = 'CNY';
const MOBILE_CARD_QUERY = '(max-width: 720px)';

function defaultCardExpanded() {
  return !window.matchMedia(MOBILE_CARD_QUERY).matches;
}

function isCardExpanded(sku) {
  return CARD_EXPANDED.has(sku) ? CARD_EXPANDED.get(sku) : defaultCardExpanded();
}

function detectInitialLang() {
  const saved = localStorage.getItem(LANG_STORAGE_KEY);
  if (saved && LOCALES_ORDER.includes(saved)) return saved;
  const navs = (navigator.languages && navigator.languages.length)
    ? navigator.languages : [navigator.language || 'en-US'];
  for (const n of navs) {
    if (LOCALES_ORDER.includes(n)) return n;
    const short = n.slice(0, 2).toLowerCase();
    const match = LOCALES_ORDER.find(l => l.toLowerCase().startsWith(short + '-'));
    if (match) return match;
  }
  return 'en-US';
}

function t(key) {
  return (I18N[LANG] && I18N[LANG][key]) || (I18N['en-US'] && I18N['en-US'][key]) || key;
}

function applyTranslations() {
  document.documentElement.lang = LANG;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.getAttribute('data-i18n'));
  });
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    el.setAttribute('placeholder', t(el.getAttribute('data-i18n-ph')));
  });
  document.title = t('site_title') + ' · ' + t('page_title');
}

async function loadData() {
  const r = await fetch('./prices.json');
  if (!r.ok) throw new Error('cannot read prices.json');
  return r.json();
}

async function loadI18n() {
  const r = await fetch('./i18n.json');
  if (!r.ok) throw new Error('cannot read i18n.json');
  const j = await r.json();
  LANG_NAMES = j.__languages__ || {};
  delete j.__languages__;
  return j;
}

async function loadProductI18n() {
  try {
    const r = await fetch('./product_i18n.json');
    if (!r.ok) return null;
    return r.json();
  } catch (_) { return null; }
}

async function loadFx() {
  const cached = localStorage.getItem(FX_CACHE_KEY);
  if (cached) {
    try {
      const obj = JSON.parse(cached);
      if (Date.now() - obj.t < FX_TTL_MS && obj.rates) {
        return { rates: obj.rates, ts: obj.t, from: 'cache' };
      }
    } catch (_) {}
  }
  for (const url of [PRIMARY_FX, FALLBACK_FX]) {
    try {
      const r = await fetch(url);
      if (!r.ok) continue;
      const j = await r.json();
      const rates = j.rates || j.conversion_rates;
      if (rates && rates.USD) {
        localStorage.setItem(FX_CACHE_KEY, JSON.stringify({ t: Date.now(), rates }));
        return { rates, ts: Date.now(), from: url };
      }
    } catch (_) {}
  }
  throw new Error('FX fetch failed');
}

function convert(amount, from, base) {
  if (!RATES || !RATES[from] || !RATES[base]) return null;
  const usd = amount / RATES[from];
  return usd * RATES[base];
}

function fmt(amount, currency) {
  // Plain formatted string (kept for any non-table caller).
  try {
    return new Intl.NumberFormat(LANG, {
      style: 'currency', currency,
      minimumFractionDigits: 2, maximumFractionDigits: 2,
    }).format(amount);
  } catch (_) { return amount + ' ' + currency; }
}

// Split a currency-formatted number into pieces we can put in separate
// fixed-width slots so the decimal point aligns across all rows
// (the Excel-style alignment that makes price columns easy to scan).
//   sym  — currency symbol ("CN¥", "US$", "¥", "₩", "R$"…)
//   int  — integer part with locale group separators ("5", "1,400", "1,00,000")
//   dec  — decimal separator ("." or ",")
//   frac — fraction digits (always 2 — we force 2-decimal display so every
//          row looks uniform, even for currencies that natively have no
//          fractional part like JPY / KRW / HUF / IDR).
function fmtParts(amount, currency) {
  const empty = { sym: currency, int: String(amount), dec: '.', frac: '00' };
  try {
    const parts = new Intl.NumberFormat(LANG, {
      style: 'currency', currency,
      minimumFractionDigits: 2, maximumFractionDigits: 2,
    }).formatToParts(amount);
    let sym = '', int = '', dec = '', frac = '';
    let seenInt = false;
    for (const p of parts) {
      switch (p.type) {
        case 'currency':
          sym += p.value;
          break;
        case 'literal':
          if (!seenInt) sym += p.value;             // literal before number → part of symbol slot
          break;
        case 'integer':
        case 'group':
          int += p.value;
          seenInt = true;
          break;
        case 'decimal':
          dec = p.value;
          break;
        case 'fraction':
          frac += p.value;
          break;
        default: break;
      }
    }
    return {
      sym: sym.trim(),
      int: int || String(Math.trunc(amount)),
      dec: dec || '.',
      frac: frac || '00',
    };
  } catch (_) {
    return empty;
  }
}

function fmtDate(ts) {
  try { return new Intl.DateTimeFormat(LANG, { dateStyle: 'medium', timeStyle: 'short' }).format(new Date(ts)); }
  catch (_) { return new Date(ts).toLocaleString(); }
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

// Return the localized product title.
// Priority:
//   1. Official localized name from product_i18n.json (scraped from store API
//      using the WEB-STORE-LOCALE: <locale> header — these are the real
//      strings shown on store.pokemontcgpocket.com).
//   2. Fallback composition using official UI i18n building blocks
//      (currency_paid + × + N + bonus_template).
function composeProduct(p) {
  // Try the official localized name first.
  const official = PRODUCT_I18N && PRODUCT_I18N[p.sku] && PRODUCT_I18N[p.sku][LANG];
  if (official && official.name) {
    return { title: official.name, sub: '' };
  }
  // Fall back to building from UI templates.
  const cur  = t('currency_paid');
  const x    = t('times_symbol');
  const bonusTpl = t('bonus_template');

  const paidExtra = (p.extras || []).find(e => e.name === 'gold-paid');
  const freeExtra = (p.extras || []).find(e => e.name === 'webshop_currency_02');

  let title;
  if (paidExtra) {
    const num = paidExtra.amount.toLocaleString(LANG);
    title = cur + ' ' + x + num;
    if (freeExtra) {
      title += '  ' + bonusTpl.replace(/\{value0[^}]*\}/, freeExtra.amount);
    }
  } else {
    title = p.name;
  }
  return { title, sub: '' };
}

function composeGroup(p) {
  // Use officially localized group_name when we have it.
  const official = PRODUCT_I18N && PRODUCT_I18N[p.sku] && PRODUCT_I18N[p.sku][LANG];
  if (official && official.group_name) return official.group_name;
  return t('items_label');
}

function render() {
  const base = document.getElementById('baseCurrency').value;
  const sortKey = document.getElementById('sortBy').value;
  const query = document.getElementById('search').value.trim().toLowerCase();
  const container = document.getElementById('container');

  const products = DATA.products.filter(p => {
    if (!query) return true;
    if (p.name.toLowerCase().includes(query) || p.sku.toLowerCase().includes(query)) return true;
    const cn = composeProduct(p);
    return cn.title.toLowerCase().includes(query)
        || (cn.sub && cn.sub.toLowerCase().includes(query));
  });

  if (!products.length) {
    container.innerHTML = '<div class="empty">' + escapeHtml(t('no_results')) + '</div>';
    return;
  }

  container.innerHTML = '';
  const grid = document.createElement('div');
  grid.className = 'grid';

  for (const p of products) {
    const priceMap = DATA.prices[p.sku] || {};
    const cn = composeProduct(p);
    const gn = composeGroup(p);
    const expanded = isCardExpanded(p.sku);
    const bodyId = 'prices-' + p.sku.replace(/[^a-z0-9_-]/gi, '-');
    let rows = Object.entries(priceMap).map(([cur, amount]) => ({
      cur, amount,
      normalized: convert(amount, cur, base),
    }));

    if (sortKey === 'currency') rows.sort((a, b) => a.cur.localeCompare(b.cur));
    else if (sortKey === 'cheap') rows.sort((a, b) => (a.normalized ?? Infinity) - (b.normalized ?? Infinity));
    else if (sortKey === 'expensive') rows.sort((a, b) => (b.normalized ?? -Infinity) - (a.normalized ?? -Infinity));

    const validNorms = rows.map(r => r.normalized).filter(v => v != null && isFinite(v));
    const minN = validNorms.length ? Math.min(...validNorms) : null;
    const maxN = validNorms.length ? Math.max(...validNorms) : null;

    const card = document.createElement('div');
    card.className = expanded ? 'card' : 'card is-collapsed';
    card.innerHTML =
      '<button class="card-head" type="button" aria-expanded="' + (expanded ? 'true' : 'false') + '" aria-controls="' + bodyId + '">' +
        '<img src="' + p.img + '" alt="" loading="lazy" onerror="this.style.visibility=\'hidden\'">' +
        '<div style="min-width:0;flex:1">' +
          '<div class="card-title">' + escapeHtml(cn.title) + '</div>' +
        '</div>' +
        '<span class="card-toggle-icon" aria-hidden="true"></span>' +
      '</button>' +
      '<div class="card-body" id="' + bodyId + '">' +
        '<table class="price-table">' +
          '<thead><tr>' +
            '<th style="width:60px">' + escapeHtml(t('th_currency')) + '</th>' +
            '<th style="width:90px">' + escapeHtml(t('price_label')) + '</th>' +
            '<th style="width:90px">≈ ' + base + '</th>' +
            '<th>' + escapeHtml(t('th_bar')) + '</th>' +
          '</tr></thead>' +
          '<tbody>' +
          rows.map(r => {
            const isCheap = r.normalized != null && r.normalized === minN;
            const isExp = r.normalized != null && r.normalized === maxN && maxN !== minN;
            const cls = isCheap ? 'cheapest' : isExp ? 'expensive' : '';
            const a = fmtParts(r.amount, r.cur);
            const n = r.normalized == null ? null : fmtParts(r.normalized, base);
            const amtHtml =
              '<span class="sym">' + escapeHtml(a.sym) + '</span>' +
              '<span class="num">' +
                '<span class="int">' + escapeHtml(a.int) + '</span>' +
                '<span class="dec">' + escapeHtml(a.dec) + '</span>' +
                '<span class="frac">' + escapeHtml(a.frac) + '</span>' +
              '</span>';
            const normHtml = n
              ? '<span class="sym">' + escapeHtml(n.sym) + '</span>' +
                '<span class="num">' +
                  '<span class="int">' + escapeHtml(n.int) + '</span>' +
                  '<span class="dec">' + escapeHtml(n.dec) + '</span>' +
                  '<span class="frac">' + escapeHtml(n.frac) + '</span>' +
                '</span>'
              : '<span class="num"><span class="int">—</span></span>';
            const barPct = (r.normalized != null && maxN > 0)
              ? Math.max(3, (r.normalized / maxN) * 100)
              : 0;
            return '<tr class="' + cls + '">' +
              '<td class="cur">' + r.cur + '</td>' +
              '<td class="amt">' + amtHtml + '</td>' +
              '<td class="norm">' + normHtml + '</td>' +
              '<td class="bar-cell"><div class="bar-track"><div class="bar" style="width:' + barPct + '%"></div></div></td>' +
            '</tr>';
          }).join('') +
          '</tbody>' +
        '</table>' +
      '</div>';
    const head = card.querySelector('.card-head');
    head.addEventListener('click', () => {
      const nextExpanded = card.classList.contains('is-collapsed');
      card.classList.toggle('is-collapsed', !nextExpanded);
      head.setAttribute('aria-expanded', nextExpanded ? 'true' : 'false');
      CARD_EXPANDED.set(p.sku, nextExpanded);
    });
    grid.appendChild(card);
  }
  container.appendChild(grid);
}

function buildLanguageSelect() {
  const sel = document.getElementById('uiLanguage');
  // Pin 繁體中文 (zh-TW) at the top, then the rest in their original order.
  const ordered = ['zh-TW', ...LOCALES_ORDER.filter(l => l !== 'zh-TW')];
  sel.innerHTML = ordered.map(loc =>
    '<option value="' + loc + '">' + (LANG_NAMES[loc] || loc) + '</option>'
  ).join('');
  sel.value = LANG;
}

function buildCurrencySelect() {
  const sel = document.getElementById('baseCurrency');
  const prev = sel.value;
  // Pin CNY first, then USD/JPY/EUR/... preferred order, then the remaining alphabetical.
  const preferred = ['CNY', 'USD', 'JPY', 'EUR', 'GBP', 'TWD', 'HKD', 'KRW'];
  const all = [...DATA.currencies];
  if (RATES && RATES.CNY && !all.includes('CNY')) all.unshift('CNY');
  const ordered = [
    ...preferred.filter(c => all.includes(c)),
    ...all.filter(c => !preferred.includes(c)).sort(),
  ];
  sel.innerHTML = ordered.map(c => '<option value="' + c + '">' + c + '</option>').join('');
  // Pick previous value if user already chose; otherwise default to CNY (or first available).
  sel.value = prev && ordered.includes(prev)
    ? prev
    : (ordered.includes(DEFAULT_BASE_CURRENCY) ? DEFAULT_BASE_CURRENCY : ordered[0]);
}

function setLanguage(lang) {
  if (!LOCALES_ORDER.includes(lang)) return;
  LANG = lang;
  localStorage.setItem(LANG_STORAGE_KEY, lang);
  applyTranslations();
  // Refresh dynamic strings that depend on translations + locale formatting
  if (DATA) document.getElementById('snapAt').textContent = fmtDate(DATA.scraped_at);
  if (RATES_TIME) {
    const src = (lastFxFrom === 'cache') ? t('fx_cache') : t('fx_online');
    document.getElementById('fxStatus').textContent = t('fx_updated') + ' ' + fmtDate(RATES_TIME) + ' (' + src + ')';
  }
  if (DATA) render();
}

let lastFxFrom = null;

(async () => {
  // Load i18n first so even error messages can be localized.
  try { I18N = await loadI18n(); } catch (_) {
    I18N = { 'en-US': { loading: 'Loading…', err_load: 'Failed:', err_http: '', no_results: 'No results' } };
  }
  LANG = detectInitialLang();
  buildLanguageSelect();
  applyTranslations();

  // Localized product names (scraped from official API). Non-fatal if missing.
  PRODUCT_I18N = await loadProductI18n();

  try {
    DATA = await loadData();
    document.getElementById('snapAt').textContent = fmtDate(DATA.scraped_at);
  } catch (e) {
    document.getElementById('container').innerHTML =
      '<div class="empty">' + escapeHtml(t('err_load')) + ' ' + escapeHtml(e.message) +
      '<br>' + escapeHtml(t('err_http')) + '</div>';
    return;
  }
  try {
    const fx = await loadFx();
    RATES = fx.rates;
    RATES_TIME = fx.ts;
    lastFxFrom = fx.from === 'cache' ? 'cache' : 'live';
    const src = (fx.from === 'cache') ? t('fx_cache') : t('fx_online');
    document.getElementById('fxStatus').textContent =
      t('fx_updated') + ' ' + fmtDate(fx.ts) + ' (' + src + ')';
  } catch (e) {
    document.getElementById('fxStatus').textContent = t('fx_failed');
  }
  buildCurrencySelect();

  document.getElementById('uiLanguage').addEventListener('change', e => setLanguage(e.target.value));
  ['baseCurrency', 'sortBy', 'search'].forEach(id => {
    document.getElementById(id).addEventListener('input', render);
  });
  render();
})();
</script>
</body>
